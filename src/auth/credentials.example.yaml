# Credentials file template for streamlit-authenticator.
# Copy this file as src/auth/credentials.yaml (it is in .gitignore) and replace:
#  - passwords (`password` field) with your own bcrypt hashes
#  - `cookie.key` to a random string (e.g. `python -c "import secrets; print(secrets.token_hex(32))"`)
#
# Generating a new bcrypt hash:
#   python -c "import bcrypt; print(bcrypt.hashpw(b'your_password', bcrypt.gensalt()).decode())"

credentials:
  usernames:
    demo:
      email: demo@example.com
      name: Demo User
      # password: demo123
      password: $2b$12$N7Wi2ugjBlkaEmKVWWWteepqRwL47GlpUOdfaH0TY8QBkZx1Iz8yq
    student:
      email: student@pw.edu.pl
      name: Student
      # password: student123
      password: $2b$12$uFyu6AQ9Ip762GiVQcd0.eocQtPHhoKt.S4gPJ8Xagqf0BNnn5VyO

cookie:
  name: stock_analysis_auth
  key: REPLACE_ME_WITH_RANDOM_HEX_STRING
  expiry_days: 7

# The preauthorized section is optional - remove it if you do not want to allow self-registration.
preauthorized:
  emails: []
