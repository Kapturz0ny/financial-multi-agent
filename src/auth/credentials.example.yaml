# Wzorzec pliku credentials dla streamlit-authenticator.
# Skopiuj ten plik jako src/auth/credentials.yaml (jest w .gitignore) i podmień:
#  - hasła (pole `password`) na własne bcrypt hashe
#  - klucz `cookie.key` na losowy ciąg (np. `python -c "import secrets; print(secrets.token_hex(32))"`)
#
# Generowanie nowego hasha bcrypt:
#   python -c "import bcrypt; print(bcrypt.hashpw(b'twoje_haslo', bcrypt.gensalt()).decode())"

credentials:
  usernames:
    demo:
      email: demo@example.com
      name: Demo User
      # hasło: demo123
      password: $2b$12$N7Wi2ugjBlkaEmKVWWWteepqRwL47GlpUOdfaH0TY8QBkZx1Iz8yq
    student:
      email: student@pw.edu.pl
      name: Student
      # hasło: student123
      password: $2b$12$uFyu6AQ9Ip762GiVQcd0.eocQtPHhoKt.S4gPJ8Xagqf0BNnn5VyO

cookie:
  name: stock_analysis_auth
  key: REPLACE_ME_WITH_RANDOM_HEX_STRING
  expiry_days: 7

# Sekcja preauthorized jest opcjonalna - usuń jeśli nie chcesz pozwolić na samorejestrację.
preauthorized:
  emails: []
